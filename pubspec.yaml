name: farmapos
description: Sistema POS para Farmacias - Offline First
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Encryption
  encrypt: ^5.0.3
  
  # UI
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_adaptive_scaffold: ^0.1.11
  
  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Barcode
  mobile_scanner: ^5.1.1
  barcode_widget: ^2.0.4
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Networking (for sync)
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  
  # Local Auth
  crypto: ^3.0.3
  
  # Excel export
  syncfusion_flutter_xlsio: ^25.2.7
  
  # File picker & XML
  file_picker: ^8.0.0+1
  xml: ^6.5.0
  excel: ^4.0.6
  
  # Window management (desktop)
  window_manager: ^0.3.9
  
  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
